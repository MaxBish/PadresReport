<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Max Bish's Dads Report</title>
  <meta name="description" content="Your #1 source for Padres truth. Game recaps, scores, and hot takes after every game." />
  <!-- Open Graph for iMessage / social previews -->
  <meta property="og:title" content="Max Bish's Dads Report" />
  <meta property="og:description" content="Your #1 source for Padres truth. Game recaps, scores, and hot takes after every game." />
  <meta property="og:image" content="https://maxbish.github.io/PadresReport/pictures/padres_logo.png" />
  <meta property="og:image:width" content="400" />
  <meta property="og:image:height" content="400" />
  <meta property="og:url" content="https://maxbish.github.io/PadresReport/" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Max Bish's Dads Report" />
  <!-- Twitter / iMessage fallback -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Max Bish's Dads Report" />
  <meta name="twitter:description" content="Your #1 source for Padres truth. Game recaps, scores, and hot takes after every game." />
  <meta name="twitter:image" content="https://maxbish.github.io/PadresReport/pictures/padres_logo.png" />
  <meta name="theme-color" content="#0D1F3C" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="image" href="https://maxbish.github.io/PadresReport/pictures/petco_park.jpg" fetchpriority="high" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=Barlow:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
<div id="root">

  <!-- HERO -->
  <div class="hero">
    <img src="https://maxbish.github.io/PadresReport/pictures/petco_park.jpg" alt="Petco Park" width="1400" height="560" fetchpriority="high" decoding="async" />
    <div class="hero-overlay"></div>
  </div>

  <!-- HEADER -->
  <div class="header">
    <div class="header-stripe">
      <div class="stripe-brown"></div>
      <div class="stripe-orange"></div>
      <div class="stripe-yellow"></div>
    </div>
    <div class="header-inner">
      <img class="header-logo" src="https://maxbish.github.io/PadresReport/pictures/padres_logo.png" alt="Padres Logo" width="72" height="72" decoding="async" />
      <div class="header-text">
        <div class="header-eyebrow">Max Bish's</div>
        <div class="header-title">Dads Report</div>
        <div class="header-sub">Your #1 Source for Padres Truth · Est. April 2026</div>
        <div id="record-badge" class="record-badge">
          <span class="record-label">2026 Record</span>
          <span id="record-display" class="record-value"></span>
        </div>
      </div>
    </div>
  </div>

  <main id="main-content">
    <!-- UP NEXT -->
    <div class="up-next-wrap">
      <div class="up-next-label">Up Next</div>
      <div class="up-next-scroll" id="up-next" aria-label="Upcoming Padres games"></div>
    </div>

    <!-- RECENT RESULTS -->
    <div style="height:8px"></div>
    <div class="section-label">Recent Results</div>
    <div id="entries"></div>
    <div id="older-wrap" class="older-wrap" hidden>
      <button id="older-toggle" class="older-toggle" type="button" aria-expanded="false" aria-controls="older-entries">
        View Older Series
      </button>
    </div>
    <div id="older-entries" class="older-entries" hidden></div>
  </main>

  <div class="footer">Max Bish's Dads Report · Updated After Every Game · San Diego Padres 2026</div>
</div>

<script src="./report-data.js"></script>
<script src="./report.js"></script>
</body>
</html>
