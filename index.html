body {
  background: #0D1F3C;
  font-family: Georgia, 'Times New Roman', serif;
  min-height: 100vh;
  padding-bottom: 48px;
}

#root { max-width: 700px; margin: 0 auto; }

/* ── HERO ── */
.hero {
  position: relative;
  height: 280px;
  overflow: hidden;
}
.hero img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center 60%;
  display: block;
}
.hero-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, rgba(13,31,60,0.3) 0%, rgba(13,31,60,0.85) 100%);
}

/* ── HEADER ── */
.header {
  background: #0D1F3C;
  border-bottom: 3px solid #FFC425;
  padding: 20px 32px 22px;
}
.header-stripe {
  display: flex;
  height: 3px;
  margin-bottom: 18px;
  border-radius: 1px;
  overflow: hidden;
}
.stripe-brown  { flex: 3; background: #7B3F00; }
.stripe-orange { flex: 1; background: #FF6B2B; }
.stripe-yellow { flex: 1; background: #FFC425; }

.header-inner {
  display: flex;
  align-items: center;
  gap: 20px;
}
.header-logo {
  width: 72px;
  height: 72px;
  object-fit: contain;
  flex-shrink: 0;
}
.header-text { flex: 1; }
.header-eyebrow {
  font-family: 'Barlow Condensed', sans-serif;
  font-style: normal;
  font-weight: 600;
  font-size: 11px;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: #C9961D;
  margin-bottom: 4px;
}
.header-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-size: 52px;
  color: #FFC425;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  line-height: 0.95;
}
.header-sub {
  margin-top: 8px;
  font-family: 'Barlow', sans-serif;
  font-size: 10px;
  color: rgba(255,255,255,0.42);
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

/* ── UP NEXT ── */
.up-next-wrap {
  background: #152845;
  border-bottom: 1px solid rgba(255,196,37,0.18);
}
.up-next-label {
  padding: 10px 32px 7px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: #FF6B2B;
}
.up-next-scroll {
  overflow-x: auto;
  display: flex;
  border-top: 1px solid rgba(255,196,37,0.18);
  -webkit-overflow-scrolling: touch;
}
.up-next-game {
  flex-shrink: 0;
  min-width: 165px;
  padding: 11px 18px 13px;
  border-right: 1px solid rgba(255,196,37,0.18);
}
.game-date-badge {
  display: inline-block;
  background: rgba(255,107,43,0.12);
  border: 1px solid rgba(255,107,43,0.30);
  border-radius: 2px;
  padding: 2px 7px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: #FF6B2B;
  margin-bottom: 7px;
}
.game-matchup {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 14px;
  letter-spacing: 0.03em;
  color: #fff;
  line-height: 1.2;
  margin-bottom: 4px;
}
.game-meta {
  font-family: 'Barlow', sans-serif;
  font-size: 10px;
  color: rgba(255,255,255,0.42);
  line-height: 1.5;
}

/* ── SECTION LABEL ── */
.section-label {
  padding: 16px 32px 10px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: #FFC425;
  border-bottom: 1px solid rgba(255,196,37,0.18);
}

/* ── CARD ── */
.card {
  margin: 12px 24px 0;
  border-radius: 3px;
  overflow: hidden;
  background: #1A3258;
  border: 1px solid rgba(255,196,37,0.18);
  border-left: 3px solid rgba(255,196,37,0.18);
}
.card.win  { border-left-color: #3DBA6F; }
.card.loss { border-left-color: #E05252; }
.card.off  { border-left-color: #A0522D; }

.card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 16px;
  background: rgba(0,0,0,0.28);
  border-bottom: 1px solid rgba(255,196,37,0.18);
}
.card-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.20em;
  text-transform: uppercase;
  color: #FFC425;
}
.card-date {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: #C8956C;
  margin-top: 2px;
}
.card-result {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: 16px;
  letter-spacing: 0.14em;
}
.card-result.win  { color: #3DBA6F; }
.card-result.loss { color: #E05252; }
.card-result.off  { color: rgba(255,255,255,0.42); }

/* score */
.score-row {
  display: flex;
  align-items: center;
  padding: 16px 20px 14px;
  border-bottom: 1px solid rgba(255,196,37,0.18);
}
.team-block { flex: 1; }
.team-block.right { text-align: right; }
.team-abbr {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-size: 36px;
  color: #FFC425;
  line-height: 1;
  letter-spacing: 0.04em;
}
.team-name {
  font-family: 'Barlow', sans-serif;
  font-size: 8px;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.42);
  margin-top: 4px;
  line-height: 1.4;
}
.score-center {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 22px;
}
.score-num {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-size: 72px;
  line-height: 1;
  color: rgba(255,255,255,0.18);
  letter-spacing: -0.01em;
}
.score-num.winner { color: #fff; }
.score-dash {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 36px;
  color: rgba(255,196,37,0.25);
  font-weight: 300;
}

/* linescore */
.linescore-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
.linescore {
  width: 100%;
  border-collapse: collapse;
  min-width: 400px;
}
.linescore th {
  text-align: center;
  padding: 5px 3px;
  font-size: 9px;
  color: rgba(255,255,255,0.42);
  background: rgba(0,0,0,0.22);
  letter-spacing: 0.06em;
  border-bottom: 1px solid rgba(255,196,37,0.18);
  border-right: 1px solid rgba(255,196,37,0.18);
}
.linescore th.team-col { text-align: left; padding-left: 12px; width: 42px; }
.linescore th.total-col { color: #C8956C; }
.linescore th:last-child, .linescore td:last-child { border-right: none; }
.linescore td {
  text-align: center;
  padding: 5px 3px;
  font-size: 11px;
  color: rgba(255,255,255,0.92);
  border-bottom: 1px solid rgba(255,196,37,0.18);
  border-right: 1px solid rgba(255,196,37,0.18);
}
.linescore td.team-col {
  text-align: left;
  padding-left: 12px;
  font-size: 10px;
  font-weight: 700;
  color: #FFC425;
  letter-spacing: 0.10em;
}
.linescore td.total-col { font-weight: 700; color: #fff; }
.linescore tr:last-child td { border-bottom: none; }

/* stats */
.stats-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  padding: 10px 16px;
  border-bottom: 1px solid rgba(255,196,37,0.18);
}
.pill {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 2px;
  white-space: nowrap;
  letter-spacing: 0.06em;
  border: 1px solid rgba(255,196,37,0.18);
  background: rgba(255,255,255,0.06);
  color: rgba(255,255,255,0.92);
}
.pill.win  { background: rgba(61,186,111,0.15);  border-color: rgba(61,186,111,0.3);  color: #3DBA6F; }
.pill.loss { background: rgba(224,82,82,0.15);   border-color: rgba(224,82,82,0.3);   color: #E05252; }
.pill-label { color: rgba(255,255,255,0.42); font-weight: 400; margin-right: 3px; }

/* body text */
.card-body {
  padding: 14px 16px 18px;
  font-family: 'Barlow', sans-serif;
  font-size: 14px;
  line-height: 1.78;
  color: rgba(255,255,255,0.88);
}
.card-body p + p { margin-top: 13px; }

/* ── RECAP PHOTO ── */
.card-photo {
  width: 100%;
  max-height: 340px;
  object-fit: cover;
  display: block;
  border-top: 1px solid rgba(255,196,37,0.18);
}
.card-photo-caption {
  padding: 7px 16px 10px;
  font-size: 10px;
  font-style: italic;
  color: rgba(255,255,255,0.40);
  border-top: 1px solid rgba(255,196,37,0.10);
  text-align: center;
}

/* footer */
.footer {
  margin-top: 24px;
  padding: 14px 32px;
  border-top: 1px solid rgba(255,196,37,0.18);
  text-align: center;
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.42);
}

// ── RENDER UP NEXT ──
const upNext = document.getElementById("up-next");

  upNext.innerHTML += `
    <div class="up-next-game">
      <div class="game-date-badge">${g.date}</div>

      <div class="game-meta">${g.venue}<br>${g.time}</div>
    </div>`;

// ── RENDER ENTRIES ──
function renderLinescore(ls, away, home) {
  const innings = ls.innings.map(i => `<th>${i}</th>`).join("");
  const totals  = `<th class="total-col">R</th><th class="total-col">H</th><th class="total-col">E</th>`;
  const awayRow = ls.away.map(r => `<td>${r}</td>`).join("");
  const homeRow = ls.home.map(r => `<td>${r}</td>`).join("");
  return `
    <div class="linescore-wrap">
      <table class="linescore">
        <thead><tr><th class="team-col"></th>${innings}${totals}</tr></thead>
        <tbody>
          <tr>
            <td class="team-col">${away.abbr}</td>${awayRow}
            <td class="total-col">${ls.awayTotals.R}</td>
            <td class="total-col">${ls.awayTotals.H}</td>
            <td class="total-col">${ls.awayTotals.E}</td>
          </tr>
          <tr>
            <td class="team-col">${home.abbr}</td>${homeRow}
            <td class="total-col">${ls.homeTotals.R}</td>
            <td class="total-col">${ls.homeTotals.H}</td>
            <td class="total-col">${ls.homeTotals.E}</td>
          </tr>
        </tbody>
      </table>
    </div>`;
}

function renderStats(stats) {
  if (!stats || !stats.length) return "";
  const pills = stats.map(s =>
    `<span class="pill ${s.type}"><span class="pill-label">${s.label}:</span>${s.value}</span>`
  ).join("");
  return `<div class="stats-row">${pills}</div>`;
}

function renderCard(e) {
  const isOff = e.type === "offday";
  const resultClass = e.result === "W" ? "win" : e.result === "L" ? "loss" : "off";
  const badge = isOff ? "OFF" : (e.seriesResult || e.result);
  const dateStr = isOff ? (e.offDaySub || "") : `${e.gameDate || ""}${e.venue ? " · " + e.venue : ""}`;

  const scoreBlock = isOff ? "" : `
    <div class="score-row">
      <div class="team-block">
        <div class="team-abbr">${e.away.abbr}</div>
        <div class="team-name">${e.away.city}<br>${e.away.name}</div>
      </div>
      <div class="score-center">
        <div class="score-num ${!e.winnerIsHome ? "winner" : ""}">${e.awayScore}</div>
        <div class="score-dash">–</div>
        <div class="score-num ${e.winnerIsHome ? "winner" : ""}">${e.homeScore}</div>
      </div>
      <div class="team-block right">
        <div class="team-abbr">${e.home.abbr}</div>
        <div class="team-name">${e.home.city}<br>${e.home.name}</div>
      </div>
    </div>`;

  const paras = e.paragraphs.map(p => `<p>${p}</p>`).join("");

  const photoBlock = e.photo ? `
    <img class="card-photo" src="${e.photo}" alt="Game photo" />
    ${e.photoCaption ? `<div class="card-photo-caption">${e.photoCaption}</div>` : ""}
  ` : "";

  return `
    <div class="card ${resultClass}">
      <div class="card-header">
        <div>
          <div class="card-label">${e.gameLabel}</div>
          ${dateStr ? `<div class="card-date">${dateStr}</div>` : ""}
        </div>
        <div class="card-result ${resultClass}">${badge}</div>
      </div>
      ${scoreBlock}
      ${e.linescore ? renderLinescore(e.linescore, e.away, e.home) : ""}
      ${renderStats(e.stats)}
      <div class="card-body">${paras}</div>
      ${photoBlock}
    </div>`;
}

const entries = document.getElementById("entries");
REPORT.entries.forEach(e => { entries.innerHTML += renderCard(e); });
